<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Feedback | JSS STU</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="container">
        <h1>Student Feedback</h1>
        <p class="subtitle">We value your input to improve our campus experience.</p>
        
        <form>
            <div class="form-group">
                <label for="fname">Full Name</label>
                <input type="text" id="fname" name="fullname" placeholder="Enter your full name" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="emailid" placeholder="name@jssstuniv.in" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="10-digit number">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="usn">USN</label>
                    <input type="text" id="usn" name="USN" placeholder="e.g. 4JS21CS001" required>
                </div>
                <div class="form-group">
                    <label for="sem">Semester</label>
                    <select id="sem" name="sem">
                        <option value="" disabled selected>Select Sem</option>
                        <option value="1">1st Sem</option>
                        <option value="2">2nd Sem</option>
                        <option value="3">3rd Sem</option>
                        <option value="4">4th Sem</option>
                        <option value="5">5th Sem</option>
                        <option value="6">6th Sem</option>
                        <option value="7">7th Sem</option>
                        <option value="8">8th Sem</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Branch</label>
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="branch" value="CS"> CSE</label>
                    <label class="radio-label"><input type="radio" name="branch" value="IS"> ISE</label>
                    <label class="radio-label"><input type="radio" name="branch" value="EC"> ECE</label>
                    <label class="radio-label"><input type="radio" name="branch" value="NCB"> Others</label>
                </div>
            </div>

            <div class="form-group">
                <label for="rating">Rate Overall Experience (1-5)</label>
                <input type="range" id="rating" name="rating" min="1" max="5" step="1" list="tickmarks">
                <datalist id="tickmarks">
                    <option value="1" label="1"></option>
                    <option value="2"></option>
                    <option value="3"></option>
                    <option value="4"></option>
                    <option value="5" label="5"></option>
                </datalist>
            </div>

            <div class="form-group">
                <label for="feedback">Feedback & Suggestions</label>
                <textarea id="feedback" rows="4" name="feedback" placeholder="What can we do better?"></textarea>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" name="req" id="req">
                <label for="req" class="inline-label">Send me a copy of this feedback</label>
            </div>

            <button type="submit" class="submit-button">Submit Feedback</button>
        </form>
    </div>

    <footer>
        <p>&copy; JSS Science and Technology University</p>
    </footer>
</body>
</html>
